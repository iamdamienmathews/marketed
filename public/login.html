<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Marketed.</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <a href="/index.html" class="wordmark">Marketed.</a>
    <h2>Welcome back</h2>
    <p class="section-copy" style="font-size:0.9rem;">Log in to your dashboard.</p>

    <form id="login-form">
      <div class="form-row"><label for="email">Email</label><input type="email" id="email" required></div>
      <div class="form-row"><label for="password">Password</label><input type="password" id="password" required></div>
      <button type="submit" class="btn btn-primary">Log in</button>
      <p class="form-status" id="status" role="status" aria-live="polite"></p>
    </form>

    <p class="auth-switch">New here? <a href="/signup.html">Create an account</a></p>
  </div>
</div>

<script src="app.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const status = document.getElementById('status');
  status.textContent = ''; status.dataset.state = '';
  try {
    const { user } = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });
    window.location.href = user.role === 'admin' ? '/admin/index.html' : '/dashboard.html';
  } catch (err) {
    status.textContent = err.message;
    status.dataset.state = 'error';
  }
});
</script>
</body>
</html>
